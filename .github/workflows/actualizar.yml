name: Actualizar datos Deye

on:
  schedule:
    - cron: '0 14 * * *'   # 11:00 Argentina
    - cron: '0 23 * * *'   # 20:00 Argentina
  workflow_dispatch:        # permite ejecutarlo manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar data.json
        env:
          DEYE_APP_ID: ${{ secrets.DEYE_APP_ID }}
          DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
          DEYE_EMAIL: ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD: ${{ secrets.DEYE_PASSWORD }}
        run: python generar_datos.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualización automática de datos" || echo "Sin cambios"
          git push
