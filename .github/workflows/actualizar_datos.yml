name: Actualizar Monitoreo Deye

on:
  schedule:
    # Se ejecuta de forma automática todos los días a las 00:00 UTC (9:00 PM de Argentina)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Esto nos habilita un botón para poder activar el robot manualmente cuando queramos

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar script de actualización
      env:
        DEYE_APP_ID: ${{ secrets.DEYE_APP_ID }}
        DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
        DEYE_EMAIL: ${{ secrets.DEYE_EMAIL }}
        DEYE_PASSWORD: ${{ secrets.DEYE_PASSWORD }}
      run: python generar_datos.py

    - name: Guardar y subir cambios en data.json
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-actualización de datos de plantas" && git push)
